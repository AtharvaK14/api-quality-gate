name: API Quality Gate

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # nightly at 06:00 UTC
  workflow_dispatch:        # allows manual trigger from the Actions tab

jobs:
  smoke:
    name: Smoke Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PAT }}
        # -p no:xdist keeps smoke tests serial for cleaner CI output
        run: pytest -m smoke -p no:xdist --alluredir=allure-results -v

      - name: Upload smoke Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/

  full-suite:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    needs: smoke     # only runs if smoke gate passes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run full suite (parallel)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PAT }}
        run: pytest -n auto --alluredir=allure-results -v

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30